<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babel — Their View</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0e; --surface: #161616; --border: #222;
    --accent: #f0d4b0; --text: #e8e4dc; --muted: #555;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .logo { font-family: Georgia, serif; font-size: 18px; }
  .logo em { font-style: italic; opacity: 0.4; font-size: 13px; margin-left: 6px; }
  .badge {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 11px; color: var(--text);
  }
  .pane-label {
    padding: 9px 18px; font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .messages {
    flex: 1; overflow-y: auto; padding: 20px 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { display: flex; flex-direction: column; max-width: 80%; animation: fadeUp 0.2s ease both; }
  .msg.mine { align-self: flex-end; }
  .msg.theirs { align-self: flex-start; }
  .bubble {
    padding: 9px 13px; border-radius: 14px; font-size: 13px; line-height: 1.55; word-break: break-word;
  }
  .msg.mine .bubble { background: var(--accent); color: #111; border-bottom-right-radius: 4px; }
  .msg.theirs .bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg-meta { font-size: 10px; color: var(--muted); margin-top: 3px; padding: 0 4px; }
  .msg.mine .msg-meta { text-align: right; }
  .typing {
    display: flex; gap: 4px; padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; border-bottom-left-radius: 4px;
    width: fit-content; align-self: flex-start;
  }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
    animation: bounce 1.1s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%,80%,100% { transform: scale(0.65); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .input-row {
    border-top: 1px solid var(--border); padding: 12px 14px;
    display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
  }
  textarea {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: system-ui, sans-serif; font-size: 14px; line-height: 1.5;
    padding: 8px 12px; resize: none; min-height: 40px; max-height: 120px;
    overflow-y: auto; outline: none; transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  button {
    width: 38px; height: 38px; border-radius: 10px; border: none;
    background: var(--accent); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s; flex-shrink: 0;
  }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  button svg { width: 15px; height: 15px; fill: #111; }
  .empty {
    position: absolute; inset: 60px 0 60px 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0.18; pointer-events: none; gap: 8px; text-align: center; padding: 20px;
  }
  .empty .ei { font-family: Georgia, serif; font-style: italic; font-size: 36px; }
  .empty p { font-size: 12px; color: var(--muted); line-height: 1.6; }
  #err {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #2a1010; border: 1px solid #6a2020; color: #f09090;
    padding: 8px 16px; border-radius: 8px; font-size: 11px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  }
  #err.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">Babel <em>母語對話</em></div>
  <div id="lang-display" class="badge">🇸🇪 Svenska</div>
</header>

<div class="pane-label"><div class="dot"></div> <span id="pane-label-text">Their view · Speak Swedish</span> <span id="conn" style="margin-left:auto;font-size:10px;color:#555">● connecting...</span></div>

<div style="flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column;">
  <div class="empty" id="empty">
    <div class="ei" id="empty-greet">Hej</div>
    <p id="empty-hint">Type in your language<br>they'll receive a translation</p>
  </div>
  <div class="messages" id="msgs"></div>
  <div id="typing-wrap" style="padding:0 16px 8px;display:none;">
    <div class="typing"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="input-row">
  <textarea id="inp" placeholder="Skriv på svenska…" rows="1"></textarea>
  <button id="btn">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<div id="err"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYEL167NOEXNGoUb6zTHxMT1CT1rupRU8",
  authDomain: "babel-chat-295eb.firebaseapp.com",
  databaseURL: "https://babel-chat-295eb-default-rtdb.firebaseio.com",
  projectId: "babel-chat-295eb",
  storageBucket: "babel-chat-295eb.firebasestorage.app",
  messagingSenderId: "42141004133",
  appId: "1:42141004133:web:d367959066fb8c26bef18c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// connection status
onValue(ref(db, '.info/connected'), snap => {
  const conn = document.getElementById('conn');
  if (snap.val()) {
    conn.textContent = '● connected';
    conn.style.color = '#6a6';
  } else {
    conn.textContent = '● offline';
    conn.style.color = '#a66';
  }
});

// ── 語言狀態（由 你 那邊控制）──────────────────────
let langName = "Swedish";
let langLabel = "🇸🇪 Svenska";

const GREETS = {
  Swedish: "Hej", English: "Hello", Japanese: "こんにちは",
  Korean: "안녕하세요", French: "Bonjour", German: "Hallo",
  Spanish: "Hola", Italian: "Ciao"
};
const PLACEHOLDERS = {
  Swedish: "Skriv på svenska…", English: "Type in English…",
  Japanese: "日本語で話す…", Korean: "한국어로 말하세요…",
  French: "Écris en français…", German: "Schreib auf Deutsch…",
  Spanish: "Escribe en español…", Italian: "Scrivi in italiano…"
};

// 監聽語言變化
onValue(ref(db, 'meta/langB'), snap => {
  const d = snap.val();
  if (!d) return;
  langName = d.name;
  langLabel = d.label;
  document.getElementById('lang-display').textContent = langLabel;
  document.getElementById('pane-label-text').textContent = `Their view · Speak ${langName}`;
  document.getElementById('empty-greet').textContent = GREETS[langName] || '...';
  document.getElementById('inp').placeholder = PLACEHOLDERS[langName] || 'Type in your language…';
});

// ── Gemini 翻譯 ────────────────────────────────────
const GEMINI_KEY = "AIzaSyA1bk21F2itiwZkbA1GcJUj6j25-mp1sIE";

async function translate(text, from, to) {
  const prompt = "Translate the following text from " + from + " to " + to + ". Return ONLY the translated text, nothing else, no explanation.

" + text;
  const res = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=" + GEMINI_KEY,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    }
  );
  if (!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  const result = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!result) throw new Error("no result: " + JSON.stringify(data));
  return result.trim();
}

// ── UI 工具 ────────────────────────────────────────
const msgsEl = document.getElementById('msgs');
const emptyEl = document.getElementById('empty');
const typingWrap = document.getElementById('typing-wrap');
const inp = document.getElementById('inp');
const btn = document.getElementById('btn');
let hasMsg = false;
let busy = false;
let seenKeys = new Set();

function now() {
  return new Date().toLocaleTimeString('en', { hour:'2-digit', minute:'2-digit' });
}

function addBubble(text, isMe, time) {
  if (!hasMsg) { emptyEl.style.display = 'none'; hasMsg = true; }
  const div = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'mine' : 'theirs');
  div.innerHTML = `<div class="bubble">${esc(text)}</div><div class="msg-meta">${time}</div>`;
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

inp.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
btn.addEventListener('click', send);

// ── 發送 ──────────────────────────────────────────
async function send() {
  if (busy) return;
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';

  busy = true; btn.disabled = true;
  const t = now();

  // 甲那邊顯示原文
  addBubble(text, true, t);

  // 顯示翻譯中狀態
  await set(ref(db, 'meta/typingB'), true);

  try {
    const translated = await translate(text, langName, "Traditional Chinese");
    await set(ref(db, 'meta/typingB'), false);

    // 寫入 Firebase
    const msgRef = push(ref(db, 'messages'));
    await set(msgRef, {
      from: 'B',
      originalB: text,
      forA: translated,   // 你看到的中文譯文
      time: t,
      ts: Date.now()
    });
  } catch(e) {
    await set(ref(db, 'meta/typingB'), false);
    showErr("Translation failed: " + e.message.slice(0, 80));
  }

  busy = false; btn.disabled = false;
  inp.focus();
}

// ── 接收你的訊息（forB = 翻譯成外語給甲看）──────────
onValue(ref(db, 'meta/typingA'), snap => {
  typingWrap.style.display = snap.val() ? 'block' : 'none';
  if (snap.val()) msgsEl.scrollTop = msgsEl.scrollHeight;
});

onChildAdded(ref(db, 'messages'), (snap, err) => {
  const key = snap.key;
  if (seenKeys.has(key)) return;
  seenKeys.add(key);
  const d = snap.val();
  showErr("got msg from: " + (d?.from) + " forB: " + (d?.forB?.slice(0,20)));
  if (!d || d.from !== 'A') return;
  addBubble(d.forB, false, d.time);
}, err => {
  showErr("Firebase error: " + err.message);
});

</script>
</body>
</html>
